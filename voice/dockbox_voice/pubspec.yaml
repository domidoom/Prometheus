name: dockbox_voice
description: Dockbox Voice — Android voice assistant thin client.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  dio: ^5.7.0
  speech_to_text: ^7.2.0
  flutter_tts: ^4.2.2
  audioplayers: ^6.1.0
  shared_preferences: ^2.3.4
  permission_handler: ^11.3.1
  webview_flutter: ^4.10.0
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/beeps/
    - assets/jarvis.html
    - assets/three.min.js

# Copy this file to settings.yaml and fill in your values,
# or just run `python setup.py` to generate it via the setup wizard.

voice:
  sample_rate: 16000
  channels: 1
  chunk_size: 1024
  silence_timeout: 0.6
  max_recording_seconds: 30
  silence_threshold: 500
  whisper_model: base
  # Double-clap wake: clap twice to activate. clap_threshold is the
  # AC-coupled int16 peak (DC offset removed) that counts as a clap onset.
  # It's an amplitude floor: set it above your mic's speech peaks so only a
  # deliberate, loud double-clap wakes the assistant. Raise it if talking false-
  # triggers; lower it if loud claps get missed.
  clap_enabled: true
  clap_threshold: 7200
  # Minimum peak/RMS (crest factor) for an onset to count as a clap. A clap is
  # impulsive (high crest); speech/music/steady noise are flatter. Raise it to
  # reject more non-clap sounds, lower it if real claps get missed.
  clap_crest: 4.0
dockbox:
  # Your Prometheus/Dockbox server. Use http://localhost:3200 for a local
  # install, or https://dockbox.dev for the cloud endpoint (cloud needs a
  # cf_access_token, below). The setup wizard writes this for you.
  base_url: http://localhost:3200
  user_id: ""
  default_jid: ""
  # 'local:' prefix pins the server orchestrator for this app's chat to a
  # specific local Ollama model (sent on every message -> ollama_chat_model:<jid>).
  model: local:gemma4:latest
  tools_model: glm-5.1:cloud
  vision_model: gemma4:31b-cloud
  # Only needed for the Cloudflare-protected cloud endpoint, not for a local server.
  cf_access_token: ""
ui:
  button_color: '#DC143C'
  button_hover_color: '#B22222'
  window_width: 480
  window_height: 480
  button_size: 300
  pulse_animation: true
audio:
  playback_device: null
  input_device: null
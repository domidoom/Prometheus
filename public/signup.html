<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up — Warden</title>
<meta name="description" content="Start your 7-day free trial of Warden. No credit card required.">
<link rel="icon" type="image/png" href="/dockbox-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=GFS+Didot&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #e8edf5;
  --bg-alt: #dce3ef;
  --surface: #f5f7fb;
  --white: #FFFFFF;
  --stone-50: #edf1f8;
  --stone-100: #dce3ef;
  --stone-200: #c7d0e0;
  --stone-400: #8994a8;
  --stone-500: #64748b;
  --stone-600: #475569;
  --stone-900: #0f172a;
  --accent: #2563eb;
  --accent-dark: #1d4ed8;
  --accent-hover: #1e40af;
  --accent-light: rgba(37,99,235,0.08);
  --green-500: #059669;
  --danger: #ef4444;
  --shadow-sm: 0 1px 3px rgba(15,23,42,0.06);
  --shadow-md: 0 4px 20px rgba(15,23,42,0.08);
  --shadow-lg: 0 16px 48px rgba(15,23,42,0.1), 0 2px 8px rgba(15,23,42,0.04);
  --radius: 12px;
  --radius-lg: 16px;
}

html { scroll-behavior: smooth; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  background: var(--bg);
  color: var(--stone-600);
  line-height: 1.8;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}

h1, h2, h3, h4 {
  font-family: 'GFS Didot', Georgia, serif;
  color: var(--stone-900);
  line-height: 1.2;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 24px;
}

/* == Navigation == */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  background: rgba(232,237,245,0.9);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid rgba(0,0,0,0.06);
}

nav .container {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 72px;
}

.logo {
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo-icon { height: 42px; width: 42px; object-fit: contain; }

.logo-text {
  font-family: 'GFS Didot', Georgia, serif;
  font-size: 1.6rem;
  color: var(--stone-900);
}

.nav-links {
  display: flex;
  gap: 28px;
  align-items: center;
}

.nav-links a {
  color: var(--stone-900);
  text-decoration: none;
  font-size: 0.875rem;
  font-weight: 500;
  transition: color 0.2s;
}

.nav-links a:hover { color: var(--stone-700); }

.btn-ghost {
  color: var(--accent);
  border: 1px solid var(--accent);
  padding: 7px 18px;
  border-radius: 10px;
  font-size: 0.875rem;
  font-weight: 600;
  text-decoration: none;
  transition: all 0.2s;
  background: transparent;
}

.btn-ghost:hover {
  background: var(--accent-light);
  color: var(--accent-hover);
}

/* == Main Content == */
.signup-wrapper {
  position: relative;
  z-index: 1;
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 120px 24px 60px;
}

.signup-card {
  background: var(--white);
  border-radius: var(--radius-lg);
  padding: 48px 40px;
  max-width: 520px;
  width: 100%;
  box-shadow: var(--shadow-lg);
  border: 1px solid var(--stone-100);
}

.signup-card .card-header {
  text-align: center;
  margin-bottom: 32px;
}

.signup-card .card-header img {
  width: 48px;
  height: 48px;
  margin-bottom: 12px;
}

.signup-card .card-header h1 {
  font-size: 1.8rem;
  margin-bottom: 8px;
}

.signup-card .card-header p {
  font-size: 0.95rem;
  color: var(--stone-500);
}

.form-group {
  margin-bottom: 20px;
}

.form-group label {
  display: block;
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--stone-900);
  margin-bottom: 6px;
}

.form-group input[type="text"],
.form-group input[type="email"],
.form-group input[type="password"] {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid var(--stone-200);
  border-radius: 10px;
  font-size: 0.95rem;
  font-family: inherit;
  color: var(--stone-900);
  background: var(--white);
  transition: border-color 0.2s;
  box-sizing: border-box;
}

.form-group input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
}

.form-group .slug-preview {
  font-size: 0.78rem;
  color: var(--stone-400);
  margin-top: 4px;
}

.form-group .slug-preview span {
  color: var(--accent);
  font-weight: 500;
}

/* Plan selection */
.plan-options {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.plan-option {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  border: 1px solid var(--stone-200);
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.15s;
}

.plan-option:hover {
  border-color: var(--stone-400);
  background: var(--stone-50);
}

.plan-option.selected {
  border-color: var(--accent);
  background: var(--accent-light);
}

.plan-option input[type="radio"] {
  accent-color: var(--accent);
  width: 18px;
  height: 18px;
  cursor: pointer;
}

.plan-option .plan-info {
  flex: 1;
}

.plan-option .plan-name {
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--stone-900);
}

.plan-option .plan-price {
  font-size: 0.8rem;
  color: var(--stone-500);
}

.pw-reqs {
  font-size: 0.78rem;
  color: var(--stone-400);
  margin-top: 4px;
}

.submit-btn {
  width: 100%;
  padding: 12px 24px;
  border: none;
  border-radius: 10px;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  background: var(--accent);
  color: #fff;
  transition: all 0.2s;
  box-shadow: 0 2px 8px rgba(37,99,235,0.25);
  margin-top: 8px;
}

.submit-btn:hover {
  background: var(--accent-hover);
  box-shadow: 0 4px 16px rgba(37,99,235,0.35);
  transform: translateY(-1px);
}

.submit-btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  transform: none;
}

.error-message {
  color: var(--danger);
  font-size: 0.85rem;
  text-align: center;
  margin-bottom: 16px;
  min-height: 1.2em;
}

.login-link {
  text-align: center;
  margin-top: 20px;
  font-size: 0.85rem;
  color: var(--stone-500);
}

.login-link a {
  color: var(--accent);
  text-decoration: none;
  font-weight: 600;
}

.login-link a:hover {
  text-decoration: underline;
}

.company-toggle {
  margin-bottom: 20px;
  text-align: center;
}

.company-toggle a {
  font-size: 0.82rem;
  color: var(--stone-400);
  text-decoration: none;
  border-bottom: 1px dashed var(--stone-300);
  padding-bottom: 1px;
  transition: color 0.2s;
}

.company-toggle a:hover {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

.trial-note {
  text-align: center;
  margin-top: 16px;
  font-size: 0.8rem;
  color: var(--stone-400);
}

.trial-note svg {
  vertical-align: middle;
  margin-right: 4px;
}

/* == Hamburger & Mobile == */
.hamburger {
  display: none;
  align-items: center;
  justify-content: center;
  background: none;
  border: 1px solid var(--stone-200);
  border-radius: 8px;
  width: 40px;
  height: 40px;
  font-size: 1.3rem;
  cursor: pointer;
  color: var(--stone-600);
}

@media (max-width: 768px) {
  .nav-links { display: none; }
  .hamburger { display: flex; }
  .signup-wrapper { padding: 100px 16px 40px; }
  .signup-card { padding: 32px 24px; }
}
</style>
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body>

<!-- == Navigation == -->
<nav>
  <div class="container">
    <a href="/" class="logo"><img src="/dockbox-logo.png" alt="" class="logo-icon"><span class="logo-text">Warden</span></a>
    <div class="nav-links">
      <a href="/pages/pricing.html">Pricing</a>
      <a href="/pages/product.html">Product</a>
      <a href="/pages/docs.html">Docs</a>
      <a href="/login" class="btn-ghost">Log In</a>
    </div>
    <button class="hamburger" onclick="document.getElementById('mobileMenu').classList.toggle('open')" aria-label="Menu">&#9776;</button>
  </div>
</nav>

<div class="signup-wrapper">
  <div class="signup-card">
    <div class="card-header">
      <img src="/dockbox-logo.png" alt="Warden">
      <h1>Start your free trial</h1>
      <p>7 days free. No credit card required.</p>
    </div>

    <form id="signupForm" onsubmit="handleSignup(event)">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" required autocomplete="name" placeholder="Jane Smith">
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required autocomplete="email" placeholder="jane@example.com">
      </div>

      <div class="company-toggle">
        <a href="#" id="companyToggle" onclick="event.preventDefault(); document.getElementById('companyGroup').style.display='block'; this.style.display='none';">Have a company code? Enter it here</a>
      </div>
      <div class="form-group" id="companyGroup" style="display:none">
        <label for="company_name">Company Code</label>
        <input type="text" id="company_name" name="company_name" placeholder="e.g. acme-inc" oninput="updateSlug()">
        <div class="slug-preview" id="slugPreview"></div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required minlength="6" autocomplete="new-password" placeholder="Min 6 characters">
        <div class="pw-reqs">At least 6 characters, one uppercase letter, one number, and one special character</div>
      </div>

      <div class="form-group">
        <label for="password_confirm">Confirm Password</label>
        <input type="password" id="password_confirm" name="password_confirm" required minlength="6" autocomplete="new-password" placeholder="Re-enter password">
      </div>

      <input type="hidden" name="plan" value="solo">

      <p class="error-message" id="errorMsg"></p>

      <div class="cf-turnstile" data-sitekey="0x4AAAAAADNaYQruztaX-zmK" data-theme="auto" data-size="flexible" style="margin-bottom:12px"></div>
      <button type="submit" class="submit-btn" id="submitBtn">Create Account</button>
    </form>

    <div class="trial-note">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;color:var(--green-500)"><polyline points="20 6 9 17 4 12"/></svg>
      7-day free trial on all plans. Cancel anytime.
    </div>

    <div class="login-link">
      Already have an account? <a href="/login">Log in</a>
    </div>
  </div>
</div>

<script>
(function() {
  // Pre-select plan from query string
  var params = new URLSearchParams(window.location.search);
  var planParam = params.get('plan');
  if (planParam) {
    var radio = document.querySelector('input[name="plan"][value="' + planParam + '"]');
    if (radio) {
      radio.checked = true;
      document.querySelectorAll('.plan-option').forEach(function(el) { el.classList.remove('selected'); });
      radio.closest('.plan-option').classList.add('selected');
    }
  }

  // Plan selection visual toggle
  document.querySelectorAll('.plan-option input[type="radio"]').forEach(function(radio) {
    radio.addEventListener('change', function() {
      document.querySelectorAll('.plan-option').forEach(function(el) { el.classList.remove('selected'); });
      if (this.checked) this.closest('.plan-option').classList.add('selected');
    });
  });
})();

function updateSlug() {
  var val = document.getElementById('company_name').value;
  var slug = val.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
  var preview = document.getElementById('slugPreview');
  if (slug) {
    preview.innerHTML = 'Your login URL: <span>dockbox.dev/' + slug + '</span>';
  } else {
    preview.textContent = '';
  }
}

async function handleSignup(e) {
  e.preventDefault();
  var errorEl = document.getElementById('errorMsg');
  var btn = document.getElementById('submitBtn');
  errorEl.textContent = '';

  var name = document.getElementById('name').value.trim();
  var email = document.getElementById('email').value.trim();
  var company_name = document.getElementById('company_name').value.trim();
  var password = document.getElementById('password').value;
  var password_confirm = document.getElementById('password_confirm').value;
  var plan = document.querySelector('input[name="plan"]');

  if (!name || !email || !password) {
    errorEl.textContent = 'Name, email, and password are required.';
    return;
  }
  if (password.length < 6) {
    errorEl.textContent = 'Password must be at least 6 characters.';
    return;
  }
  if (!/[A-Z]/.test(password)) {
    errorEl.textContent = 'Password must contain an uppercase letter.';
    return;
  }
  if (!/[0-9]/.test(password)) {
    errorEl.textContent = 'Password must contain a number.';
    return;
  }
  if (!/[^A-Za-z0-9]/.test(password)) {
    errorEl.textContent = 'Password must contain a special character.';
    return;
  }
  if (password !== password_confirm) {
    errorEl.textContent = 'Passwords do not match.';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Creating account...';

  try {
    var r = await fetch('/api/signup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name: name,
        email: email,
        company_name: company_name,
        password: password,
        plan: plan.value,
        turnstile_token: document.querySelector('[name="cf-turnstile-response"]')?.value || ''
      })
    });
    var d = await r.json();
    if (d.error) {
      errorEl.textContent = d.error;
      btn.disabled = false;
      btn.textContent = 'Create Account';
      return;
    }
    if (d.ok && d.login_url) {
      window.location.href = d.login_url;
    }
  } catch (err) {
    errorEl.textContent = 'Something went wrong. Please try again.';
    btn.disabled = false;
    btn.textContent = 'Create Account';
  }
}
</script>
</body>
</html>
